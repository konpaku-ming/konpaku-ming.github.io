name: Music Player Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run once a day at 06:00 UTC to catch third-party API outages early.
    - cron: '0 6 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Check music player
        # Run in non-strict mode: API availability from a GitHub Actions runner
        # is treated as a warning, not a build failure. The player has local
        # fallbacks, and third-party endpoints may block or throttle datacenter
        # IPs. Build-integrity checks (generated JS, fallback files, homepage
        # markup) remain fatal. Use `python3 .github/scripts/check_music_player.py --strict`
        # if you want API failures to fail the workflow.
        run: python3 .github/scripts/check_music_player.py
