<div id="bg-blur-toggle">
  <button
    id="bg-blur-btn"
    class="pointer-events-auto flex h-12 w-12 items-center justify-center rounded-full bg-neutral/50 text-neutral-700 hover:text-primary-600 dark:bg-neutral-800/50 dark:text-neutral dark:hover:text-primary-400 backdrop-blur-sm"
    aria-label="切换背景模糊"
    title="切换背景模糊"
    data-state="blurred">
    <span class="bg-blur-icon" style="display:block;width:1.25rem;height:1.25rem;border-radius:50%;background:radial-gradient(circle, currentColor 40%, transparent 70%);filter:blur(2px);opacity:0.85;"></span>
  </button>
</div>
