{{ $announcements := site.Data.announcements }}
{{ if and $announcements $announcements.items }}
  {{ $items := $announcements.items }}
  {{ if gt (len $items) 0 }}
    {{ $latest := index $items (sub (len $items) 1) }}
    <div class="w-full max-w-prose mx-auto mb-8">
      <div class="flex items-center gap-3 rounded-lg bg-primary-100 dark:bg-neutral-800 border border-primary-200 dark:border-white px-4 py-3 overflow-hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary-600 announcement-icon flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
        </svg>
        <div class="flex-1 min-w-0 overflow-hidden flex flex-row flex-nowrap items-center gap-2">
          <span class="text-xs font-medium text-primary-700 bg-primary-200 announcement-tag px-2 py-0.5 rounded whitespace-nowrap flex-shrink-0">
            {{ $latest.date }}
          </span>
          <div class="text-sm text-neutral-700 dark:text-white min-w-0" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1 1 0%;">
            {{ $latest.content }}
          </div>
        </div>
        <a href="{{ $announcements.viewMoreLink | default `/updates/` }}" class="text-xs text-primary-600 announcement-link hover:underline whitespace-nowrap flex-shrink-0">
          查看历史 →
        </a>
      </div>
    </div>
  {{ end }}
{{ end }}
